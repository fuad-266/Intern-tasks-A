spring.application.name=student-course-system

# H2 Database Configuration (Fallback for easy running)
spring.datasource.url=jdbc:h2:mem:student_course_db;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enspring.application.name=student-course-system
server.port=8081

# 1. ACTIVE: XAMPP MySQL Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/student_course_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 2. JPA / Hibernate Configuration for MySQL
# Use MySQL8Dialect (works for XAMPP's MariaDB/MySQL)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# 3. Disable H2 Console (No longer needed)
spring.h2.console.enabled=falseabled=true

